name = "hand"
version = "0.1.0"
wasm = "hand.wasm"

capabilities = [
    "transport.http.inbound",
    "storage.sqlite",
]

[config]
# JWT secret for player-facing auth. Override per-deployment.
jwt_secret = "dev-jwt-secret-change-me"

# Service-to-service shared secret for internal endpoints.
service_token = "dev-service-token-change-me"
